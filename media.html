<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Audio, video y galería de imágenes de Misiles a Tierra.">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Media — Misiles a Tierra</title>
</head>

<body>
    <header class="site-header">
        <div class="bar">
            <a class="brand" href="index.html">MISILES <span>A</span> TIERRA</a>
            <nav class="site-nav" aria-label="Navegación principal">
                <a href="index.html">Home</a>
                <a href="bio.html">Biografía</a>
                <a href="discografia.html">Discografía</a>
                <a href="integrantes.html">Integrantes</a>
                <a class="active" href="media.html">Media</a>
                <a href="contacto.html">Contacto</a>
            </nav>
        </div>
    </header>

    <main class="wrap">
        <section>
            <p class="eyebrow">Audio · Video · Fotos</p>
            <h1>Media</h1>
        </section>

        <section class="panel">
            <h2>Audio — Viento (cover de Caifanes)</h2>
            <audio controls preload="none">
                <source src="Viento_Caifanes_cover_Santiago.mp3" type="audio/mpeg">
                Tu navegador no soporta el elemento de audio.
            </audio>
        </section>

        <section>
            <h2>Video</h2>
            <div class="video-grid">
                <iframe src="https://www.youtube-nocookie.com/embed/f7wtTFyvMFg" title="Misiles a Tierra — video 1"
                        loading="lazy" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen></iframe>
                <iframe src="https://www.youtube-nocookie.com/embed/sUxndLnjihM" title="Misiles a Tierra — video 2"
                        loading="lazy" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen></iframe>
            </div>
        </section>

        <section>
            <h2>Imágenes</h2>
            <p style="color:var(--muted); font-size:0.9rem; margin-bottom:1rem;">Desliza para ver la galería →</p>
            <div class="gallery" tabindex="0" aria-label="Galería de imágenes de la banda">
                <figure class="framed">
                    <img src="logoband.jpg" alt="Logo alterno de la banda" loading="lazy">
                    <figcaption><strong>Logo alterno</strong> — hecho con una foto de Santiago, ¡jaja!</figcaption>
                </figure>
                <figure class="framed">
                    <img src="portadaalbum.jpg" alt="Portada de álbum nunca usada" loading="lazy">
                    <figcaption><strong>Portada de álbum</strong> — ¡nunca usada!</figcaption>
                </figure>
                <figure class="framed">
                    <img src="logo.jpg" alt="Logo posterior a la separación" loading="lazy">
                    <figcaption><strong>Logo tras la separación</strong> — ¡sin tiempo para remordimientos!</figcaption>
                </figure>
                <figure class="framed">
                    <img src="sesiones2.jpg" alt="Sesión de la banda" loading="lazy">
                    <figcaption><strong>Sesiones</strong> — la banda en acción</figcaption>
                </figure>
                <figure class="framed">
                    <img src="presentacion.jpg" alt="Presentación en vivo" loading="lazy">
                    <figcaption><strong>Presentación</strong> — en vivo</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p class="seal">◇ Geometría sagrada ◇</p>
        <p>Misiles a Tierra · Bogotá, Colombia · <a href="contacto.html">Contáctanos</a></p>
    </footer>
</body>

</html>
