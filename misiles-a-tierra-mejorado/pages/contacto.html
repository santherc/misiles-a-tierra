<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contacta a Misiles a Tierra: escríbenos y suscríbete al boletín.">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <title>Contacto — Misiles a Tierra</title>
</head>

<body>
    <header class="site-header">
        <div class="bar">
            <a class="brand" href="../index.html">MISILES <span>A</span> TIERRA</a>
            <nav class="site-nav" aria-label="Navegación principal">
                <a href="../index.html">Home</a>
                <a href="bio.html">Biografía</a>
                <a href="discografia.html">Discografía</a>
                <a href="integrantes.html">Integrantes</a>
                <a href="media.html">Media</a>
                <a class="active" href="contacto.html">Contacto</a>
            </nav>
        </div>
    </header>

    <main class="wrap">
        <section>
            <p class="eyebrow">Escríbenos</p>
            <h1>Contacto</h1>
            <p style="margin-top:1.2rem; max-width:640px; color:var(--muted);">
                ¿Quieres saber más de la banda, proponer una fecha o simplemente saludar? Déjanos tu mensaje.</p>
        </section>

        <section>
            <!--
              NOTA: un sitio estático no puede procesar formularios por sí solo.
              Para recibir los mensajes, crea una cuenta gratuita en https://formspree.io
              y reemplaza TU_ID en el atributo action de abajo.
            -->
            <form class="contact" action="https://formspree.io/f/TU_ID" method="POST">
                <div>
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" autocomplete="name" required>
                </div>
                <div>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" autocomplete="email" required>
                </div>
                <div>
                    <label for="boletin">¿Quieres recibir nuestro boletín?</label>
                    <label style="text-transform:none; letter-spacing:0; color:var(--paper); display:inline-flex; gap:0.4rem; align-items:center; margin-right:1.2rem;">
                        <input type="radio" name="boletin" value="si" checked> Sí
                    </label>
                    <label style="text-transform:none; letter-spacing:0; color:var(--paper); display:inline-flex; gap:0.4rem; align-items:center;">
                        <input type="radio" name="boletin" value="no"> No
                    </label>
                </div>
                <div>
                    <label for="comentarios">Mensaje</label>
                    <textarea id="comentarios" name="comentarios" required></textarea>
                </div>
                <button type="submit">Enviar mensaje</button>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p class="seal">◇ Geometría sagrada ◇</p>
        <p>Misiles a Tierra · Bogotá, Colombia</p>
    </footer>
</body>

</html>
